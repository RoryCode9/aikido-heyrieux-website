<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="{{ site.Home.RelPermalink }}" aria-label="{{ site.Title }} home">
      <span class="brand-mark" aria-hidden="true">合</span>
      <span>{{ site.Params.clubName | default site.Title }}</span>
    </a>
    <nav class="site-nav" aria-label="Main navigation">
      <ul>
        {{ range site.Menus.main }}
          <li><a href="{{ .URL }}" {{ if or ($.IsMenuCurrent .Menu .) ($.HasMenuCurrent .Menu .) }}aria-current="page"{{ end }}>{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
