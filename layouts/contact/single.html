{{ define "main" }}
<section class="page-hero compact">
  <div class="container">
    <p class="eyebrow">Start training</p>
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="lede">{{ . }}</p>{{ end }}
  </div>
</section>
<section class="container contact-layout">
  <div class="prose">
    {{ .Content }}
    <p><strong>Dojo:</strong> {{ site.Params.location }}</p>
    <p><strong>Email:</strong> hello@example.com</p>
  </div>

  <!-- Static site note: Hugo cannot process form submissions by itself.
       Replace params.formEndpoint in hugo.toml with a real endpoint such as
       Formspree, StaticForms, Netlify Forms, or a custom backend endpoint. -->
  <form class="contact-form" action="{{ site.Params.formEndpoint }}" method="post">
    <div class="form-row">
      <label for="name">Name <span aria-hidden="true">*</span></label>
      <input id="name" name="name" type="text" autocomplete="name" required minlength="2">
    </div>
    <div class="form-row">
      <label for="email">Email <span aria-hidden="true">*</span></label>
      <input id="email" name="email" type="email" autocomplete="email" required>
    </div>
    <div class="form-row">
      <label for="phone">Phone <span class="optional">optional</span></label>
      <input id="phone" name="phone" type="tel" autocomplete="tel">
    </div>
    <div class="form-row">
      <label for="message">Message <span aria-hidden="true">*</span></label>
      <textarea id="message" name="message" rows="6" required minlength="10"></textarea>
    </div>
    <div class="honeypot" aria-hidden="true">
      <label for="website">Website</label>
      <input id="website" name="website" type="text" tabindex="-1" autocomplete="off">
    </div>
    <button class="button primary" type="submit">Send message</button>
    <p class="form-note">This demo form uses a placeholder endpoint. Configure a real static-form provider before launch.</p>
  </form>
</section>
{{ end }}
